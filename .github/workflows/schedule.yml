name: Mosa Backend Scheduled Jobs

on:
  schedule:
    - cron: "0 2 * * *"   # Daily 02:00 UTC
    - cron: "0 1 * * 0"   # Weekly Sunday 01:00 UTC
  workflow_dispatch:

jobs:
  backend_jobs:
    name: Run Backend Jobs
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mosa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mosa_test
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: |
          alembic upgrade head

      - name: Run daily dashboard update
        run: |
          python scripts/update_dashboard_metrics.py

      - name: Clean expired sessions
        run: |
          python scripts/cleanup_sessions.py

      - name: Generate weekly report (only on Sunday)
        if: github.event.schedule == '0 1 * * 0'
        run: |
          python scripts/weekly_report.py